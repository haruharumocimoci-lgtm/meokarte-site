name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vite build
        env:
          VITE_STRIPE_LINK_BASIC: ${{ vars.VITE_STRIPE_LINK_BASIC }}
          VITE_STRIPE_LINK_MEO: ${{ vars.VITE_STRIPE_LINK_MEO }}
          VITE_STRIPE_LINK_EC: ${{ vars.VITE_STRIPE_LINK_EC }}
          VITE_STRIPE_LINK_DOMAIN: ${{ vars.VITE_STRIPE_LINK_DOMAIN }}
      # SPAフォールバック: /success・/cancel への直アクセスでもアプリを配信する
      - run: cp dist/public/index.html dist/public/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
